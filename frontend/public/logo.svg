<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" fill="none">
  <!--
    MAITRISEZ logo mark.
    Two overlapping rounded rectangles at -28deg, with circular notches.
  -->
  <defs>
    <mask id="notches">
      <rect width="520" height="280" fill="white"/>
      <!-- Upper notch -->
      <circle cx="198" cy="98" r="20" fill="black"/>
      <!-- Lower notch -->
      <circle cx="322" cy="182" r="20" fill="black"/>
    </mask>
  </defs>
  <g mask="url(#notches)">
    <!-- Upper section: rotated -28deg around its center (195, 75) -->
    <rect x="60" y="20" width="270" height="110" rx="20" ry="20"
          transform="rotate(-28 195 75)" fill="#C1FF30"/>
    <!-- Lower section: rotated -28deg around its center (325, 140) -->
    <rect x="190" y="85" width="270" height="110" rx="20" ry="20"
          transform="rotate(-28 325 140)" fill="#C1FF30"/>
  </g>
</svg>
