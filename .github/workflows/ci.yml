name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend — install
        working-directory: Backend
        run: npm ci

      - name: Backend — lint
        working-directory: Backend
        run: npx eslint .
        continue-on-error: true

      - name: Backend — test
        working-directory: Backend
        run: npx vitest run
        env:
          MONGODB_URI: mongodb://localhost:27017/quizapp_test
          JWT_SECRET: test-secret
          CLERK_SECRET_KEY: sk_test_dummy
          ADMIN_SECRET_CODE: test-code

      - name: AdminFrontend — install
        working-directory: AdminFrontend
        run: npm ci

      - name: AdminFrontend — lint
        working-directory: AdminFrontend
        run: npm run lint

      - name: AdminFrontend — build
        working-directory: AdminFrontend
        run: npm run build

      - name: userFrontend — install
        working-directory: userFrontend
        run: npm ci

      - name: userFrontend — lint
        working-directory: userFrontend
        run: npm run lint

      - name: userFrontend — build
        working-directory: userFrontend
        run: npm run build
